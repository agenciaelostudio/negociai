services:

  # ============================
  # NegociAí (Next.js)
  # ============================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: negociai_app
    restart: unless-stopped
    expose:
      - 3000
    env_file:
      - .env.production
    networks:
      - negociai
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================
  # Caddy (Proxy reverso + SSL)
  # ============================
  caddy:
    image: caddy:2-alpine
    container_name: negociai_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - negociai
    depends_on:
      app:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  negociai:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
