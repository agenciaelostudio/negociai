<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Post 8 - Preco</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f0f0f0}
.post{width:600px;height:600px;background:linear-gradient(160deg,#0f172a,#064e3b 100%);position:relative;overflow:hidden;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.glow{position:absolute;width:350px;height:350px;border-radius:50%;filter:blur(70px)}
.glow-1{top:-50px;left:-30px;background:#10b981;opacity:0.12}
.glow-2{bottom:-40px;right:-20px;background:#059669;opacity:0.08}
.content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;padding:50px;text-align:center}
.tag{display:inline-flex;margin:0 auto 20px;background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);padding:8px 18px;border-radius:100px;font-size:12px;font-weight:600;color:#6ee7b7;letter-spacing:1px;text-transform:uppercase;width:fit-content}
.price-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:36px;margin-bottom:0}
.old-price{font-size:20px;color:#64748b;text-decoration:line-through;margin-bottom:4px}
.current-price{font-size:64px;font-weight:900;background:linear-gradient(135deg,#34d399,#6ee7b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.current-price span{font-size:28px}
.payment-info{font-size:14px;color:#94a3b8;margin-top:8px;margin-bottom:24px}
.features{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;text-align:left;max-width:300px;margin-left:auto;margin-right:auto}
.feature{display:flex;align-items:center;gap:10px;font-size:14px;color:#cbd5e1}
.feature svg{width:18px;height:18px;stroke:#10b981;fill:none;stroke-width:2;min-width:18px}
.cta{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;padding:16px 40px;border-radius:14px;font-size:18px;font-weight:700;text-decoration:none;margin-top:4px;box-shadow:0 8px 32px rgba(16,185,129,0.3);transition:all .2s}
.small-text{font-size:12px;color:#64748b;margin-top:12px}
</style>
</head>
<body>
<div class="post">
<div class="glow glow-1"></div><div class="glow glow-2"></div>
<div class="content">
<div class="tag">Oferta de Lancamento</div>
<div class="price-card">
<div class="old-price">R$ 97,00</div>
<div class="current-price">R$<span>19,90</span></div>
<p class="payment-info">Pagamento unico • Acesso vitalicio • PIX ou cartao</p>
<div class="features">
<div class="feature"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Kit personalizado com IA</div>
<div class="feature"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> 50+ mensagens prontas</div>
<div class="feature"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Uso vitalicio do material</div>
<div class="feature"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Sem mensalidade</div>
</div>
<a class="cta" href="#">Quero meu kit agora <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>
</div>
<p class="small-text">Preco promocional por tempo limitado</p>
</div>
</div>
</body>
</html>
