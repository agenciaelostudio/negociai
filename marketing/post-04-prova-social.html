<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post 4 - Prova Social</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Outfit', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
.post { width: 600px; height: 600px; background: linear-gradient(160deg, #0a0f1a 0%, #0d2818 100%); position: relative; overflow: hidden; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.glow { position: absolute; width: 400px; height: 400px; border-radius: 50%; filter: blur(80px); }
.glow-1 { top: -120px; right: -80px; background: #10b981; opacity: 0.12; }
.glow-2 { bottom: -80px; left: -60px; background: #059669; opacity: 0.08; }
.content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 50px; }
.tag {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3);
  padding: 8px 18px; border-radius: 100px; font-size: 12px; font-weight: 600;
  color: #6ee7b7; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; width: fit-content;
}
.stats-row { display: flex; gap: 20px; margin-bottom: 30px; }
.stat-card { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 24px; text-align: center; }
.stat-card .num { font-size: 42px; font-weight: 900; background: linear-gradient(135deg, #34d399, #6ee7b7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat-card .label { font-size: 13px; color: #94a3b8; margin-top: 4px; font-weight: 500; }
.testimonial { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
.testimonial .stars { color: #f59e0b; font-size: 16px; margin-bottom: 10px; }
.testimonial .quote { font-size: 15px; color: #cbd5e1; line-height: 1.6; font-style: italic; }
.testimonial .author { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
.testimonial .author .avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #10b981, #059669); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 14px; }
.testimonial .author .name { font-size: 13px; font-weight: 600; color: #fff; }
.testimonial .author .role { font-size: 11px; color: #64748b; }
h1 { font-size: 32px; font-weight: 800; color: #fff; margin-bottom: 20px; line-height: 1.2; }
</style>
</head>
<body>
<div class="post">
  <div class="glow glow-1"></div><div class="glow glow-2"></div>
  <div class="content">
    <div class="tag">Resultados Reais</div>
    <div class="stats-row">
      <div class="stat-card"><div class="num">150+</div><div class="label">Prestadores usando</div></div>
      <div class="stat-card"><div class="num">97%</div><div class="label">Aprovam o sistema</div></div>
      <div class="stat-card"><div class="num">3x</div><div class="label">Mais fechamentos</div></div>
    </div>
    <div class="testimonial">
      <div class="stars">★★★★★</div>
      <div class="quote">"Antes eu travava quando o cliente pedia desconto. Agora tenho resposta na hora e fechei 3 clientes na mesma semana."</div>
      <div class="author">
        <div class="avatar">RM</div>
        <div><div class="name">Rafael M.</div><div class="role">Barbeiro - SP</div></div>
      </div>
    </div>
    <p style="font-size:13px;color:#64748b;text-align:center;">Junte-se a 150+ prestadores que ja transformaram seu atendimento</p>
  </div>
</div>
</body>
</html>
