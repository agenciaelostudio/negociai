<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post 1 - Problema</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Outfit', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
.post {
  width: 600px; height: 600px;
  background: linear-gradient(145deg, #0a0f1a 0%, #132020 100%);
  position: relative; overflow: hidden;
  border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.glow { position: absolute; width: 400px; height: 400px; border-radius: 50%; filter: blur(80px); opacity: 0.15; }
.glow-1 { top: -100px; right: -100px; background: #10b981; }
.glow-2 { bottom: -100px; left: -100px; background: #059669; }
.content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 50px; }
.tag {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3);
  padding: 8px 18px; border-radius: 100px; font-size: 13px; font-weight: 600;
  color: #6ee7b7; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 30px;
}
.tag svg { width: 16px; height: 16px; fill: none; stroke: #6ee7b7; stroke-width: 2; }
h1 { font-size: 46px; font-weight: 900; line-height: 1.1; color: #fff; margin-bottom: 16px; }
h1 span { background: linear-gradient(135deg, #10b981, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
p { font-size: 18px; color: #94a3b8; line-height: 1.6; max-width: 480px; margin-bottom: 35px; }
.stat { display: flex; gap: 40px; padding-top: 25px; border-top: 1px solid rgba(255,255,255,0.06); }
.stat-item { text-align: left; }
.stat-num { font-size: 28px; font-weight: 800; color: #10b981; }
.stat-label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
.logo { position: absolute; top: 30px; left: 50px; z-index: 3; display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
.logo-icon svg { width: 20px; height: 20px; fill: none; stroke: #fff; stroke-width: 2.5; }
.logo-text { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
.logo-text span { color: #10b981; }
</style>
</head>
<body>
<div class="post">
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>
    <div class="logo-text">Negoci<span>Aí</span></div>
  </div>
  <div class="content" style="padding-top: 80px;">
    <div class="tag">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
      VOCE SE IDENTIFICA?
    </div>
    <h1>Cliente pediu<br>desconto e voce<br><span>travou?</span></h1>
    <p>Sem um roteiro de negociacao, voce perde vendas que poderiam estar fechadas em minutos. O NegociAí resolve isso.</p>
    <div class="stat">
      <div class="stat-item"><div class="stat-num">72%</div><div class="stat-label">perdem vendas</div></div>
      <div class="stat-item"><div class="stat-num">5 min</div><div class="stat-label">para resolver</div></div>
      <div class="stat-item"><div class="stat-num">50+</div><div class="stat-label">mensagens prontas</div></div>
    </div>
  </div>
</div>
</body>
</html>
